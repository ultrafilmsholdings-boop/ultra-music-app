<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultra Music Group</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    .header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .banner {
      height: 250px;
      background: linear-gradient(to right, #000, #222);
      display: flex;
      align-items: center;
      padding: 20px;
      font-size: 24px;
    }

    .section {
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .scroll {
      display: flex;
      overflow-x: auto;
      gap: 15px;
    }

    .card {
      min-width: 160px;
      height: 220px;
      border-radius: 12px;
      background: #1a1a1a;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      font-size: 14px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
    }
  </style>
</head>
<body>

<div class="header">ULTRA MUSIC GROUP</div>

<div class="banner">
  Featured Artist
</div>

<div class="section">
  <h2>Artists</h2>
  <div class="scroll">
    <div class="card">Juan Pablo</div>
    <div class="card">Lily Heart</div>
    <div class="card">Neon Euphoria</div>
  </div>
</div>

<div class="section">
  <h2>New Releases</h2>
  <div class="scroll">
    <div class="card">Hearts on the Highway</div>
    <div class="card">Corazón de Acero</div>
  </div>
</div>

</body>
</html>
