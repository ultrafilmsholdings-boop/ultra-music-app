<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultra Music Group</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }
    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .section {
      padding: 20px;
    }
    .scroll {
      display: flex;
      overflow-x: auto;
      gap: 15px;
    }
    .card {
      min-width: 150px;
      height: 200px;
      background: #222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="header">Ultra Music Group</div>

<div class="section">
  <h2>Artists</h2>
  <div class="scroll">
    <div class="card">Artist 1</div>
    <div class="card">Artist 2</div>
    <div class="card">Artist 3</div>
  </div>
</div>

<div class="section">
  <h2>New Releases</h2>
  <div class="scroll">
    <div class="card">Release 1</div>
    <div class="card">Release 2</div>
  </div>
</div>

</body>
</html>
